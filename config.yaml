control:
  keyboard:
    angle_step: 5
    enabled: true
    gripper_step: 10.0
    pos_step: 0.01
  mink:
    enabled: true
    end_effector_site: tools_link
    mujoco_scene: mink/examples/arm620/scene_dual_unified_base.xml
  pybullet:
    enabled: true
  use_mink: true
  vr:
    enabled: true
    orientation_reference_quat_xyzw:
      left:
      - 0.6133185704817465
      - 0.03638127929831347
      - -0.015506442979743205
      - 0.7888449048101668
      right:
      - 0.6238796148995309
      - -0.07605639858459375
      - 0.11194518175019069
      - 0.7697128858412539
gripper:
  closed_angle: 45.0
  open_angle: 0.0
ik:
  hysteresis_threshold: 0.05
  movement_penalty_weight: 0.01
  position_error_threshold: 0.001
  reference_poses_file: reference_poses_arm620.json
  use_reference_poses: true
network:
  host_ip: 0.0.0.0
  https_port: 8443
  websocket_port: 8442
paths:
  urdf_path: mink/examples/arm620/urdf/arm620.urdf
robot:
  left_arm:
    enabled: true
    interface: rclpy
    name: Left ARM620
    port: /dev/ttySO100blue
  require_state_feedback: false
  right_arm:
    enabled: true
    interface: rclpy
    name: Right ARM620
    port: /dev/ttySO100red
  send_interval: 0.001
  vr_to_robot_scale: 1
ssl:
  certfile: cert.pem
  keyfile: key.pem
